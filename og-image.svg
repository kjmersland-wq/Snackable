<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030308"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
    <path d="M 72 0 L 0 0 0 72" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top border gradient line -->
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#6366F1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="2" fill="url(#border-grad)"/>

  <!-- ⚡ Badge -->
  <rect x="72" y="72" width="72" height="72" rx="16" fill="url(#badge-grad)"/>
  <text x="108" y="126" text-anchor="middle" font-size="42" font-family="'Segoe UI Emoji', sans-serif">⚡</text>

  <!-- Brand name -->
  <text x="162" y="100" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="white">SnackAble</text>
  <text x="162" y="132" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" letter-spacing="-0.5" fill="url(#text-grad)">Learn</text>

  <!-- AI badge pill -->
  <rect x="72" y="195" width="130" height="30" rx="15" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="137" y="215" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5" fill="#8B5CF6">AI-DREVET · 2025</text>

  <!-- Main headline -->
  <text x="72" y="320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" letter-spacing="-3" fill="white">SnackAble</text>
  <text x="72" y="410" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" letter-spacing="-3" fill="url(#text-grad)" filter="url(#glow-filter)">Learn</text>

  <!-- Subtitle -->
  <text x="72" y="468" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94A3B8" letter-spacing="-0.3">Fra passiv til aktiv læring på 60 sekunder</text>

  <!-- Stats pills -->
  <rect x="72" y="505" width="160" height="44" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="152" y="533" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8"><tspan font-weight="800" fill="#8B5CF6">&lt; 60s</tspan> til ferdig kurs</text>

  <rect x="244" y="505" width="160" height="44" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="324" y="533" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8"><tspan font-weight="800" fill="#10B981">200%</tspan> bedre retensjon</text>

  <rect x="416" y="505" width="160" height="44" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="496" y="533" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#94A3B8"><tspan font-weight="800" fill="#06B6D4">4 formater</tspan> støttet</text>

  <!-- Right side decorative element -->
  <rect x="750" y="160" width="380" height="310" rx="24" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <!-- App mockup inside -->
  <rect x="750" y="160" width="380" height="42" rx="24" fill="rgba(139,92,246,0.08)"/>
  <rect x="750" y="181" width="380" height="21" fill="rgba(139,92,246,0.08)"/>
  <circle cx="780" cy="181" r="7" fill="#FF5F57"/>
  <circle cx="800" cy="181" r="7" fill="#FFBD2E"/>
  <circle cx="820" cy="181" r="7" fill="#28C840"/>

  <!-- Module cards in mockup -->
  <rect x="770" y="222" width="340" height="60" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="790" y="244" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#8B5CF6">QUIZ</text>
  <text x="790" y="262" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94A3B8">Hva er Active Recall?</text>
  <text x="790" y="276" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#475569">Teknikk for aktiv gjenhenting fra hukommelsen</text>

  <rect x="770" y="292" width="340" height="60" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="790" y="314" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#06B6D4">FLASHCARD</text>
  <text x="790" y="332" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#94A3B8">Spaced Repetition (SM-2)</text>
  <text x="790" y="346" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#475569">Repetisjonsalgoritme — samme som Anki</text>

  <rect x="770" y="362" width="340" height="42" rx="10" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="940" y="389" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#10B981">✅ Kurs klart på 47 sekunder</text>

  <!-- Bottom right brand tag -->
  <text x="1128" y="600" text-anchor="end" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#475569">KM Tech Labs · Kristiansand, Norge</text>

  <!-- Bottom border gradient line -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#border-grad)"/>
</svg>
